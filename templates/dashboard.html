{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold mb-4 text-gray-800">Dashboard</h2>

<div class="grid md:grid-cols-2 gap-6">
  <!-- Chat AI Card -->
  <div class="bg-white shadow rounded-xl p-6">
    <h3 class="text-xl font-semibold mb-2 text-blue-600">Chat AI</h3>
    <div id="chat-history" class="h-64 overflow-y-auto mb-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
      <p class="text-gray-400">এখনো কিছু শেখানো হয়নি।</p>
    </div>
    <form id="chat-form" class="flex">
      <input type="text" id="question" class="flex-1 border rounded-l-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="আপনার প্রশ্ন লিখুন...">
      <button type="submit" class="bg-blue-600 text-white px-4 rounded-r-lg hover:bg-blue-700 transition">Send</button>
    </form>
  </div>

  <!-- Teach AI Card -->
  <div class="bg-white shadow rounded-xl p-6">
    <h3 class="text-xl font-semibold mb-2 text-green-600">Teach AI</h3>
    <form id="teach-form">
      <input type="text" id="teach-question" class="w-full mb-2 p-2 border rounded-lg" placeholder="প্রশ্ন লিখুন">
      <input type="text" id="teach-answer" class="w-full mb-2 p-2 border rounded-lg" placeholder="উত্তর লিখুন">
      <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">Teach AI</button>
    </form>
  </div>
</div>

<!-- Suggestion Card -->
<div class="max-w-3xl mx-auto mt-6 p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded-lg">
  <p class="text-yellow-800 font-medium">Suggestion: তুমি কি জানতে চাও — বাংলাদেশ, বিজ্ঞান, নাকি প্রযুক্তি?</p>
</div>

<script>
  const chatForm = document.getElementById('chat-form');
  const chatHistory = document.getElementById('chat-history');
  chatForm.addEventListener('submit', async e => {
    e.preventDefault();
    const questionInput = document.getElementById('question');
    const q = questionInput.value.trim();
    if(!q) return;
    
    // Add user message
    const userBubble = document.createElement('div');
    userBubble.className = 'chat-bubble user-msg';
    userBubble.textContent = q;
    chatHistory.appendChild(userBubble);

    questionInput.value = '';

    // Call backend API
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: q})
    });
    const data = await res.json();

    // Add AI response
    const aiBubble = document.createElement('div');
    aiBubble.className = 'chat-bubble ai-msg';
    aiBubble.textContent = data.answer;
    chatHistory.appendChild(aiBubble);

    chatHistory.scrollTop = chatHistory.scrollHeight;
  });

  const teachForm = document.getElementById('teach-form');
  teachForm.addEventListener('submit', async e => {
    e.preventDefault();
    const tq = document.getElementById('teach-question').value.trim();
    const ta = document.getElementById('teach-answer').value.trim();
    if(!tq || !ta) return;
    
    const res = await fetch('/teach', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: tq, answer: ta})
    });
    const data = await res.json();
    alert(data.message);
    teachForm.reset();
  });
</script>
{% endblock %}
