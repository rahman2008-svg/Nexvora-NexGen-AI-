{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl shadow-lg">
  <h2 class="text-2xl font-bold mb-4 text-green-600">Register</h2>
  <form method="POST" action="/register">
    <input type="text" name="name" placeholder="Name" class="w-full mb-3 p-2 border rounded-lg">
    <input type="email" name="email" placeholder="Email" class="w-full mb-3 p-2 border rounded-lg">
    <input type="password" name="password" placeholder="Password" class="w-full mb-3 p-2 border rounded-lg">
    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">Register</button>
  </form>
  <p class="mt-4 text-gray-500 text-sm">Already have an account? <a href="/login" class="text-blue-600 hover:underline">Login</a></p>
</div>
{% endblock %}
