{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl shadow-lg">
  <h2 class="text-2xl font-bold mb-4 text-blue-600">Login</h2>
  <form method="POST" action="/login">
    <input type="email" name="email" placeholder="Email" class="w-full mb-3 p-2 border rounded-lg">
    <input type="password" name="password" placeholder="Password" class="w-full mb-3 p-2 border rounded-lg">
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Login</button>
  </form>
  <p class="mt-4 text-gray-500 text-sm">Not registered? <a href="/register" class="text-blue-600 hover:underline">Register</a></p>
</div>
{% endblock %}
