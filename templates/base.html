<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexvora NexGen AI</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
    .chat-bubble { padding: 8px 12px; border-radius: 12px; margin-bottom: 4px; max-width: 75%; }
    .user-msg { background-color: #3B82F6; color: white; margin-left: auto; }
    .ai-msg { background-color: #10B981; color: white; margin-right: auto; }
    #chat-history { scroll-behavior: smooth; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Nexvora NexGen AI</h1>
    <nav>
      <a href="/dashboard" class="text-gray-700 hover:text-blue-600 mx-2">Dashboard</a>
      <a href="/logout" class="text-red-600 hover:text-red-800 mx-2">Logout</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-1 container mx-auto p-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-white shadow p-4 text-center text-gray-500">
    &copy; 2026 Nexvora Lab's | Developed by Prince AR Abdur Rahman
  </footer>

</body>
</html>
